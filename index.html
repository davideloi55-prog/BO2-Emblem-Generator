<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BO2 Emblem Generator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>BO2 Emblem Generator</h1>

    <p>Versão 0.3</p>

    <input
        type="file"
        id="imageInput"
        accept="image/*"
        style="display:none;">

    <label for="imageInput" class="buttonLabel">
        📷 Escolher Imagem
    </label>

    <br><br>

    <img
        id="preview"
        src=""
        style="display:none;max-width:100%;border-radius:10px;">

    <br><br>
<h2>💬 Como queres o emblema?</h2>

<textarea
id="promptInput"
placeholder="Exemplo:

• Remove o fundo

• Quero poucas camadas

• Ultra realista

• Apenas a cara"></textarea>
    <button id="generateButton">
        🎨 Gerar Código
    </button>

    <div id="result">
        Nenhuma imagem carregada.
    </div>
<hr>

<h3>🔧 Debug</h3>

<div id="debugPanel">

    A iniciar...

</div>
</div>

<script src="js/debug.js"></script>
<script src="js/app.js"></script>
    <script src="engine/engine.js"></script>
    
</body>
</html>
